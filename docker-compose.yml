version: "3.8"
services:
  api:
    build: .
    ports: ["8000:8000"]
    volumes: ["./models:/app/models", "./data:/app/data"]
    command: uvicorn api.app:app --host 0.0.0.0 --port 8000

  dashboard:
    build: .
    ports: ["8501:8501"]
    volumes: ["./models:/app/models", "./data:/app/data"]
    command: streamlit run streamlit_app/dashboard.py --server.port 8501 --server.address 0.0.0.0
    depends_on: [api]
